# ============================================
# CONFIGURACIÓN PRINCIPAL
# ============================================
spring.application.name=techrepair-backend
server.port=8088

# ============================================
# BASE DE DATOS MySQL
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/techrepair_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=M1SQL_r00t!2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=TechRepair2024SecretKeyForJWTTokenGenerationVerySecureAndLong
jwt.expiration=86400000

# ============================================
# CORS CONFIGURATION
# ============================================
cors.allowed-origins=http://localhost:8088,http://localhost:5173,http://localhost:5174

# ============================================
# JSP CONFIGURATION
# ============================================
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# ============================================
# FILE UPLOAD
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# EMAIL (Desactivado para desarrollo)
# ============================================
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ============================================
# DEVTOOLS
# ============================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/java

# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.techrepair.backend=DEBUG

# ============================================
# WEBSOCKET
# ============================================
spring.websocket.enabled=true