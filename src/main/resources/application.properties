# ============================================
# CONFIGURACIÓN PRINCIPAL
# ============================================
spring.application.name=techrepair-backend
server.port=${PORT:8088}

# ============================================
# BASE DE DATOS MySQL - RAILWAY
# ============================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/railway?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=TechRepair2024SecretKeyForJWTTokenGenerationVerySecureAndLong
jwt.expiration=86400000

# ============================================
# CORS CONFIGURATION
# ============================================
cors.allowed-origins=http://localhost:5173,http://localhost:5174

# ============================================
# FILE UPLOAD
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.com.techrepair.backend=INFO