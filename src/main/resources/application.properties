spring.application.name=techrepair-backend
server.address=0.0.0.0
server.port=8080
spring.datasource.url=jdbc:mariadb://localhost:3306/techrepair?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
jwt.secret=${JWT_SECRET:TechRepairDevSecretKeyChangeInProd1234567890}
jwt.expiration=86400000
cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://192.168.*.*:*,http://10.*.*.*:*,http://172.*.*.*:*
spring.servlet.multipart.max-file-size=10MB

# Mail (example - override in prod)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=
spring.mail.password=
